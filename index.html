<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Tracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-white shadow-sm mb-6">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">
                <i class="fa-solid fa-chart-line mr-2"></i>PriceTracker
            </h1>
            <div id="status-badge" class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-sm font-semibold flex items-center">
                <div class="w-2 h-2 bg-yellow-500 rounded-full mr-2 animate-pulse"></div>
                Łączenie z API...
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mb-8">
        <div class="bg-indigo-50 rounded-xl p-4 flex flex-col sm:flex-row justify-between items-center border border-indigo-100 shadow-sm transition-all" id="system-bar">
            <div class="flex items-center mb-4 sm:mb-0">
                <div class="bg-indigo-200 p-2 rounded-lg mr-4">
                    <i class="fa-solid fa-clock-rotate-left text-indigo-700 text-xl"></i>
                </div>
                <div>
                    <p class="text-sm text-indigo-800 font-medium">Kolejne sprawdzanie cen za:</p>
                    <p id="countdown-timer" class="text-2xl font-bold text-indigo-600 font-mono tracking-wider">--:--:--</p>
                </div>
            </div>
            <button id="scrape-now-btn" onclick="triggerManualScrape()"
                    class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-lg transition shadow-sm flex items-center justify-center">
                <i class="fa-solid fa-bolt mr-2 text-yellow-300"></i> Wymuś skanowanie teraz
            </button>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="md:col-span-1">
            <div class="bg-white rounded-xl shadow-md p-6 sticky top-6">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Dodaj nowy produkt</h2>
                <form id="add-product-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Link do produktu (URL)</label>
                        <input type="url" id="product-url" required placeholder="https://sklep.pl/produkt"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Cena docelowa (PLN)</label>
                        <input type="number" id="target-price" required step="0.01" min="0" placeholder="np. 199.99"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    </div>
                    <button type="submit" id="submit-btn"
                            class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 flex justify-center items-center">
                        <i class="fa-solid fa-plus mr-2"></i> Dodaj produkt
                    </button>
                </form>
                <div id="form-message" class="mt-4 text-sm text-center hidden"></div>
            </div>
        </div>

        <div class="md:col-span-2 pb-12">
            <h2 class="text-xl font-bold mb-4 flex items-center justify-between">
                <span>Śledzone produkty</span>
                <button onclick="fetchProducts()" class="text-sm bg-slate-200 hover:bg-slate-300 text-slate-700 py-1.5 px-3 rounded-lg transition font-medium flex items-center">
                    <i class="fa-solid fa-rotate-right mr-2 text-xs"></i> Odśwież listę
                </button>
            </h2>

            <div id="products-container" class="space-y-4">
                <div class="text-center text-gray-500 py-8">Ładowanie produktów...</div>
            </div>
        </div>

    </main>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        // Elementy UI
        const statusBadge = document.getElementById('status-badge');
        const productsContainer = document.getElementById('products-container');
        const form = document.getElementById('add-product-form');
        const submitBtn = document.getElementById('submit-btn');
        const formMessage = document.getElementById('form-message');
        const countdownTimer = document.getElementById('countdown-timer');
        const scrapeBtn = document.getElementById('scrape-now-btn');

        let countdownInterval;

        // Ustawienie statusu połączenia
        function setApiStatus(isOnline) {
            if (isOnline) {
                statusBadge.className = 'px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm font-semibold flex items-center';
                statusBadge.innerHTML = '<div class="w-2 h-2 bg-green-500 rounded-full mr-2"></div> API Online';
            } else {
                statusBadge.className = 'px-3 py-1 rounded-full bg-red-100 text-red-700 text-sm font-semibold flex items-center';
                statusBadge.innerHTML = '<div class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse"></div> Brak połączenia';
                countdownTimer.textContent = "--:--:--";
                clearInterval(countdownInterval);
            }
        }

        // --- NOWE: ODLICZANIE I STATUS SYSTEMU ---
        async function fetchSystemStatus() {
            try {
                const response = await fetch(`${API_URL}/system/status`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.next_run_time) {
                        startCountdown(new Date(data.next_run_time));
                    }
                }
            } catch (error) {
                console.error("Błąd pobierania statusu systemu:", error);
            }
        }

        function startCountdown(targetDate) {
            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    countdownTimer.innerHTML = "<span class='text-green-600 animate-pulse'>Skanowanie...</span>";
                    clearInterval(countdownInterval);
                    setTimeout(() => {
                        fetchSystemStatus(); // Pobierz nowy czas za chwilę
                        fetchProducts();     // Odśwież ceny po skanowaniu
                    }, 5000);
                    return;
                }

                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                countdownTimer.textContent =
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // --- NOWE: RĘCZNE WYMUSZENIE SKANOWANIA ---
        async function triggerManualScrape() {
            const originalContent = scrapeBtn.innerHTML;
            scrapeBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Trwa skanowanie...';
            scrapeBtn.disabled = true;
            scrapeBtn.classList.replace('bg-indigo-600', 'bg-indigo-400');

            // Animacja paska odliczania
            countdownTimer.innerHTML = "<span class='text-indigo-400 animate-pulse'>Skanowanie w tle...</span>";
            clearInterval(countdownInterval);

            try {
                const response = await fetch(`${API_URL}/system/scrape-now`, { method: 'POST' });
                if (response.ok) {
                    // Czekamy 4 sekundy, aż backend zrobi trochę roboty, zanim odświeżymy widok
                    setTimeout(() => {
                        fetchProducts();
                        fetchSystemStatus();
                        resetScrapeButton(originalContent);
                    }, 4000);
                } else {
                    throw new Error("Błąd serwera");
                }
            } catch (error) {
                alert("Nie udało się wymusić skanowania.");
                resetScrapeButton(originalContent);
                fetchSystemStatus();
            }
        }

        function resetScrapeButton(originalContent) {
            scrapeBtn.innerHTML = originalContent;
            scrapeBtn.disabled = false;
            scrapeBtn.classList.replace('bg-indigo-400', 'bg-indigo-600');
        }


        // Pobieranie produktów z API
        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                if (!response.ok) throw new Error('Błąd sieci');

                const products = await response.json();
                setApiStatus(true);
                renderProducts(products);
            } catch (error) {
                setApiStatus(false);
                productsContainer.innerHTML = `
                    <div class="bg-red-50 text-red-600 p-4 rounded-xl border border-red-200 text-center">
                        Nie udało się połączyć z API. Upewnij się, że FastAPI jest włączone i adres to ${API_URL}.
                    </div>`;
            }
        }

        // Renderowanie kart produktów
        function renderProducts(products) {
            if (products.length === 0) {
                productsContainer.innerHTML = `
                    <div class="bg-white p-8 rounded-xl border border-gray-200 text-center text-gray-500 shadow-sm">
                        <i class="fa-solid fa-box-open text-4xl mb-3 text-gray-300"></i>
                        <p>Brak śledzonych produktów. Dodaj swój pierwszy link!</p>
                    </div>`;
                return;
            }

            productsContainer.innerHTML = '';
            products.forEach(product => {
                const isTargetMet = product.current_price !== null && product.current_price <= product.target_price;
                const priceColor = isTargetMet ? 'text-green-600' : 'text-slate-800';
                const priceBg = isTargetMet ? 'bg-green-50 border-green-200 shadow-sm' : 'bg-slate-50 border-slate-200';
                const fireIcon = isTargetMet ? '<i class="fa-solid fa-fire text-red-500 ml-2 animate-bounce" title="Cena osiągnęła cel!"></i>' : '';

                let displayUrl = product.url;
                try {
                    const urlObj = new URL(product.url);
                    displayUrl = urlObj.hostname + (urlObj.pathname.length > 25 ? urlObj.pathname.substring(0, 25) + '...' : urlObj.pathname);
                } catch(e) {}

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 group";

                card.innerHTML = `
                    <div class="flex-1 overflow-hidden w-full">
                        <a href="${product.url}" target="_blank" class="text-indigo-600 hover:text-indigo-800 font-medium truncate flex items-center mb-1.5" title="${product.url}">
                            <i class="fa-solid fa-link text-xs mr-2 bg-indigo-100 p-1.5 rounded text-indigo-500"></i>
                            <span class="truncate">${displayUrl}</span>
                        </a>
                        <div class="text-sm text-gray-500 flex items-center gap-4 ml-7">
                            <span class="bg-gray-100 px-2 py-0.5 rounded text-xs">ID: ${product.id}</span>
                            <span>Cel: <strong class="text-gray-700">${product.target_price.toFixed(2)} PLN</strong></span>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end border-t sm:border-t-0 pt-3 sm:pt-0 mt-3 sm:mt-0">
                        <div class="px-4 py-2 rounded-lg border ${priceBg} flex flex-col items-end min-w-[130px]">
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">Obecna cena</span>
                            <div class="flex items-center">
                                <span class="text-lg font-bold ${priceColor}">
                                    ${product.current_price !== null ? product.current_price.toFixed(2) + ' PLN' : '<span class="text-sm text-gray-400 font-normal">Brak danych</span>'}
                                </span>
                                ${fireIcon}
                            </div>
                        </div>

                        <button onclick="deleteProduct(${product.id})" class="text-gray-300 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-lg transition" title="Usuń produkt">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                productsContainer.appendChild(card);
            });
        }

        // Dodawanie produktu
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const urlInput = document.getElementById('product-url').value;
            const targetPriceInput = parseFloat(document.getElementById('target-price').value);

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Przetwarzanie...';

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput, target_price: targetPriceInput })
                });

                if (!response.ok) throw new Error('Błąd dodawania produktu');

                form.reset();
                showMessage('Produkt dodany pomyślnie!', 'success');
                fetchProducts();

            } catch (error) {
                showMessage('Wystąpił błąd podczas dodawania.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-plus mr-2"></i> Dodaj produkt';
            }
        });

        // Usuwanie produktu
        async function deleteProduct(id) {
            if (!confirm('Czy na pewno chcesz usunąć ten produkt?')) return;

            try {
                const response = await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Błąd usuwania');
                fetchProducts();
            } catch (error) {
                alert('Nie udało się usunąć produktu.');
            }
        }

        // Pomocnicza
        function showMessage(text, type) {
            formMessage.textContent = text;
            formMessage.className = `mt-4 text-sm text-center font-medium p-2.5 rounded-lg ${type === 'success' ? 'text-green-700 bg-green-50 border border-green-200' : 'text-red-700 bg-red-50 border border-red-200'}`;
            formMessage.classList.remove('hidden');
            setTimeout(() => formMessage.classList.add('hidden'), 4000);
        }

        // Uruchomienie początkowe
        fetchProducts();
        fetchSystemStatus(); // Inicjalizacja odliczania
    </script>
</body>
</html>
